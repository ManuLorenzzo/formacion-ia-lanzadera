title: Pack descargable
subtitle: Formación IA para Producto · Lanzadera · Abril 2026
description: Materiales descargables de la formación IA para Producto en Lanzadera

# Sin tema externo — usamos layouts y CSS propios para tener control de diseño.
# theme: (none)

# Permalinks limpios (sin .html en URLs).
permalink: pretty

# Solo publicar la landing y la carpeta de assets descargables.
include:
  - asset-pack
  - assets

exclude:
  - presentation
  - demo-prep
  - docs
  - node_modules
  - bun.lock
  - package.json
  - "*.png"
  - "*.jpeg"
  - "*.xlsx"
  - "*.pptx"
  - .DS_Store
  - .gitignore
  - README.md
  - asset-pack/README.md

# Variables disponibles en los layouts.
url: https://manulorenzzo.github.io
baseurl: /formacion-ia-lanzadera

# Defaults para que los .md del asset-pack usen el layout de página.
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
    values:
      layout: page
