<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a2d4d" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark">PACK · IA para Producto</span>
      <span class="brand-sub">Lanzadera · Abril 2026</span>
    </a>
    <nav class="site-nav" aria-label="Navegación principal">
      <a href="{{ '/asset-pack/matriz-quiero-x-usa-y' | relative_url }}">Matriz</a>
      <a href="{{ '/asset-pack/cheat-sheet-5cs' | relative_url }}">5 C's</a>
      <a href="{{ '/asset-pack/perks-lanzadera' | relative_url }}">Perks</a>
      <a href="{{ '/asset-pack/prompts-plantilla' | relative_url }}">Prompts</a>
    </nav>
  </div>
</header>

<main class="site-main">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div>
        <div class="footer-title">Pack descargable</div>
        <div class="footer-meta">Formación IA para Producto · Lanzadera · Abril 2026</div>
      </div>
      <div class="footer-links">
        <a href="https://github.com/ManuLorenzzo/formacion-ia-lanzadera" target="_blank" rel="noopener">Código fuente</a>
        <a href="https://linkedin.com/in/manu-lorenzo" target="_blank" rel="noopener">Manu Lorenzo</a>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
